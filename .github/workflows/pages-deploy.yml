name: GitHub Pages Demo

# 214: UI Demo Mode를 https://1976haru.github.io/autotrade/ 에 배포한다.
# 백엔드(FastAPI)는 Pages에서 실행되지 않으므로, 빌드 시 VITE_DEMO_MODE=true
# 를 주입해 BackendOfflineBanner가 친화적인 "🧪 Demo Mode" 배너로 분기되게
# 한다. 실제 broker / API key / 계좌번호는 어떤 빌드 산출물에도 포함되지 않는다.
#
# 215/216: 처음에는 actions/deploy-pages@v4 (Source=GitHub Actions 모드)만
# 사용했으나, repo 설정의 "GitHub Actions" 토글이 실제로 저장되지 않는 UI
# 이슈를 만나서 (Source가 계속 "Deploy from a branch: main"으로 남아 Jekyll이
# README.md를 렌더해 버림) — 217: branch 모드와 호환되는 두 번째 publish 경로
# 추가. 빌드 산출물을 gh-pages 브랜치에 force-push해, 운영자가 Settings →
# Pages → Branch 드롭다운만 main → gh-pages로 바꿔도 데모가 라이브가 된다.
# 이미 익숙한 드롭다운이라 Source 토글 UX 문제를 우회.
#
# 두 경로(GitHub Actions deploy + gh-pages branch publish)는 서로 독립이라
# 병행 가능. Source 설정에 따라 둘 중 하나가 라이브로 매핑됨.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/pages-deploy.yml'
  workflow_dispatch:

permissions:
  contents: write   # gh-pages 브랜치 force-push에 필요
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: |
          cd frontend
          npm ci
      - name: Build (Pages, Demo Mode)
        env:
          # /autotrade/ prefix 로 모든 자산을 참조하도록.
          VITE_BASE_PATH: /autotrade/
          # 빈 응답일 때 BackendOfflineBanner가 데모 안내로 분기.
          VITE_DEMO_MODE: 'true'
        run: |
          cd frontend
          npm run build
      - name: SPA fallback (404 -> index)
        # GitHub Pages는 client-side routing이 없어 404가 그대로 노출된다.
        # 현재 SPA는 path routing을 쓰지 않지만, 향후 hash 외 라우터로 바뀌어도
        # 안전하도록 index.html을 404.html로도 복사 — vite spa 표준 패턴.
        run: cp frontend/dist/index.html frontend/dist/404.html
      - name: Disable Jekyll on the served branch
        # 217: gh-pages 브랜치를 serve할 때 Jekyll이 _ 로 시작하는 자산을 무시
        # 하지 않도록. branch 모드에서 Pages는 기본적으로 Jekyll을 돌리는데,
        # .nojekyll이 있으면 정적 파일을 그대로 serve. (Source=GitHub Actions
        # 모드에서는 영향 없음 — Jekyll 자체가 호출되지 않음.)
        run: touch frontend/dist/.nojekyll
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
      - name: Upload dist for gh-pages job
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist
          retention-days: 1
          include-hidden-files: true

  # 217: Source = "GitHub Actions" 모드 경로. Source가 GitHub Actions로 설정된
  # 경우만 실효이며, branch 모드라도 실패하지 않고 단지 "site config not found"
  # 같은 안내가 logs에 남는다. 두 경로를 같이 두면 운영자가 Source를 어느
  # 모드로 두든 한쪽이 동작.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

  # 217: Source = "Deploy from a branch" + Branch: gh-pages 경로. 빌드 산출물을
  # gh-pages 브랜치에 force-push 한다. peaceiris/actions-gh-pages는 가장 널리
  # 쓰이는 deploy action이라 별도 토큰 없이 GITHUB_TOKEN만으로 동작.
  publish-gh-pages:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          # 빈 commit message — peaceiris가 자동으로 채워줌.
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
