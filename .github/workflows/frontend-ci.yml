name: Frontend CI

on:
  push:
    branches: [main, develop, 'feature/**']
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

# 157: 일반 CI는 fast unit + lint + build만. stress (Approvals.stress.test.jsx)
# 는 frontend-ci-nightly.yml에서 별도 실행.
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: |
          cd frontend
          npm ci
      - name: Lint
        run: |
          cd frontend
          npm run lint
      - name: Test (fast)
        # vitest run + stress test 파일 제외. vitest config 또는 glob exclude로
        # 처리 — 본 PR에선 명시적 exclude 패턴 사용.
        run: |
          cd frontend
          npx vitest run --exclude '**/*.stress.test.jsx'
      - name: Build
        run: |
          cd frontend
          npm run build
