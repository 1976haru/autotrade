# Agent Trader v1 — Windows desktop release workflow.
#
# 본 워크플로는 GitHub Actions Windows runner 에서 EXE/MSI installer 를 자동
# 빌드한다. 로컬 PC 에 Rust / WiX 를 설치하지 않은 운영자도 Actions 탭에서
# *수동 실행* 으로 산출물을 받을 수 있다.
#
# === 절대 원칙 (CLAUDE.md) ===
#
# 1. **secret / API key / .env 를 artifact 에 포함하지 않는다**
#    - 본 workflow 는 어떤 KIS / Anthropic / Telegram secret 도 *읽지 않는다*.
#    - 운영자가 `backend/.env` 를 *로컬에서 별도로* 채우는 흐름 — 빌드 시점에
#      bundle 0건.
#    - signing private key 는 *절대 repo 에 commit 하지 않는다* — 후속 PR 에서
#      GitHub Secrets (`TAURI_PRIVATE_KEY`) 만 사용.
#
# 2. **안전 flag 를 활성화하지 않는다**
#    - LIVE / AI / FUTURES 관련 enable flag 를 true 로 설정 0건.
#    - KIS paper 강제 flag 를 false 로 해제 0건.
#    - 빌드 단계에서 `.env.example` 만 참조 — 실 secret 0건.
#
# 3. **실거래 코드를 활성화하지 않는다**
#    - 본 workflow 는 *빌드만* 수행 — 어떤 broker / OrderExecutor /
#      route_order 도 호출하지 않는다.
#    - 산출물은 GitHub Release 의 *draft* 로만 업로드 — 운영자 수동 publish.
#
# 4. **자동 트리거 없음 — 수동 trigger only**
#    - `workflow_dispatch` 만 활성. `push: tags: 'v*'` 등 자동 트리거 미설정.
#    - 운영자가 *명시적으로* Actions 탭에서 실행 → release tag 입력 →
#      draft 옵션 확인.
#
# === 흐름 (workflow_dispatch 후) ===
#
#   1) Checkout
#   2) Setup Node 20 + Python 3.12 + Rust stable
#   3) Cache cargo / pip
#   4) Install Tauri CLI v2
#   5) Safety guard — .env / settings 안전 flag 검증
#   6) Frontend: npm ci + test + build
#   7) Backend sidecar: PyInstaller 빌드 → src-tauri/binaries/
#   8) Tauri build (cargo tauri build) → NSIS setup.exe (우선 산출물)
#   9) Safety guard — 산출물에 secret 포함 0건 검증
#  10) Upload artifact (workflow artifact + GitHub Release draft)
#
# === MSI 산출 보류 (2026-05-15) ===
#
# 이전 빌드 시도에서 `cargo tauri build` 가 다음 에러로 실패:
#   Downloading https://github.com/wixtoolset/wix3/releases/download/...
#   Error failed to bundle project `http status: 503`
#
# 원인: Tauri 가 MSI 번들링 시 WiX 3.14 ZIP 을 GitHub release 에서 *외부
# 다운로드* 하는데, GitHub release CDN 503 으로 빌드가 죽음. 앱 컴파일
# 자체는 정상.
#
# 임시 조치: tauri.conf.json `bundle.targets` 를 `["nsis"]` 단일로 축소
# (MSI 일시 제거). 베타테스터 EXE 원클릭 배포 목적상 NSIS setup.exe 만으로
# 충분하다. MSI 재활성화는 `%LOCALAPPDATA%\tauri\WixTools314` 캐시 step
# 또는 사전 다운로드 step 을 추가한 *별도 PR* 에서 진행한다 — 이번 PR 에서
# MSI 를 강제 성공시키려 하지 않는다.
#
# 자세한 정책: docs/desktop_update_policy.md / docs/desktop_packaging.md /
# docs/desktop_exe_status.md

name: desktop-release

on:
  # *수동 trigger only*. 자동 push/tag 트리거 없음.
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (예: v1.0.1-beta.1) — GitHub Release draft 생성 시 사용"
        required: true
        type: string
      draft:
        description: "GitHub Release 를 draft 로 생성 (true 권장 — 운영자 수동 publish)"
        required: true
        default: true
        type: boolean
      create_release:
        description: "GitHub Release draft 생성 여부 (false 면 workflow artifact 만 업로드)"
        required: true
        default: true
        type: boolean

# 본 workflow 가 무엇을 할 수 있는지 *명시 제한* — GITHUB_TOKEN 권한 최소화.
permissions:
  contents: write   # GitHub Release draft 업로드용 (create_release=true 때만)

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      # ----- 0. release_tag sanitize (가장 먼저 실행) -----
      # workflow_dispatch input 은 운영자가 자유롭게 입력 — 잘못된 값이 artifact
      # 이름 / GitHub Release tag 에 들어가면 후속 step 의 파일 경로 / API 호출
      # 이 깨질 수 있다. SemVer-스타일 (선택적 'v' prefix + N.N.N + 선택적
      # pre-release / build metadata) 만 허용하고 그 외는 *즉시 fail*.
      # 경로 traversal / 명령 injection / 공백 / 한글 모두 차단.
      # 허용 예: v1.0.0 / v1.0.1-beta.1 / 1.0.0+build.5 / v2.10.0-rc.1
      # 차단 예: ../etc/passwd / v1.0.0; rm -rf / "v1 release" / latest
      - name: Sanitize release_tag input
        shell: pwsh
        run: |
          $tag = "${{ inputs.release_tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            Write-Error "release_tag 가 비어 있음 — workflow_dispatch input 필수"
            exit 1
          }
          # 길이 제한 (DoS / 비정상 입력 방지).
          if ($tag.Length -gt 64) {
            Write-Error "release_tag 가 너무 김 (64자 초과): length=$($tag.Length)"
            exit 1
          }
          # SemVer-스타일 정규식. 'v' prefix 선택, dot-separated 숫자 3개,
          # 선택적 pre-release ('-' 다음 영숫자/마침표/하이픈), 선택적 build
          # metadata ('+' 다음 영숫자/마침표/하이픈).
          $semver = '^v?\d+\.\d+\.\d+(-[A-Za-z0-9.\-]+)?(\+[A-Za-z0-9.\-]+)?$'
          if ($tag -notmatch $semver) {
            Write-Error "release_tag 형식이 SemVer 가 아님: '$tag' (예: v1.0.1 / v1.0.1-beta.1)"
            exit 1
          }
          Write-Host "[OK] release_tag sanitize 통과: '$tag'"

      # ----- 1. Checkout -----
      - name: Checkout
        uses: actions/checkout@v4

      # ----- 2. Node / Python / Rust setup -----
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Setup Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry / target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.toml', 'src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Tauri CLI v2
        run: cargo install tauri-cli --version "^2" --locked

      # ----- 3. Safety guard (빌드 전) -----
      # 본 workflow 가 안전 flag 를 활성화하지 않음을 *regex 패턴*으로 검증.
      # banned 리스트를 리터럴 문자열로 임베드하지 않음 — 본 검증 자체가
      # repository hygiene 의 grep 검사에 false positive 가 되지 않도록.
      - name: Safety guard — .env default + workflow self-check
        shell: pwsh
        run: |
          $env_example = Get-Content backend/.env.example -Raw

          # .env.example 의 default 가 *안전* 값으로 유지되는지 regex 검증.
          # `\s*=\s*` 패턴으로 리터럴 "KEY=VALUE" 가 본 yml 에 등장하지 않음.
          if ($env_example -notmatch 'ENABLE_LIVE_TRADING\s*=\s*false') {
            Write-Error "Safety flag default violated: ENABLE_LIVE_TRADING 가 false 가 아님"
            exit 1
          }
          if ($env_example -notmatch 'ENABLE_AI_EXECUTION\s*=\s*false') {
            Write-Error "Safety flag default violated: ENABLE_AI_EXECUTION 가 false 가 아님"
            exit 1
          }
          if ($env_example -notmatch 'ENABLE_FUTURES_LIVE_TRADING\s*=\s*false') {
            Write-Error "Safety flag default violated: ENABLE_FUTURES_LIVE_TRADING 가 false 가 아님"
            exit 1
          }
          if ($env_example -notmatch 'KIS_IS_PAPER\s*=\s*true') {
            Write-Error "Safety flag default violated: KIS_IS_PAPER 가 true 가 아님"
            exit 1
          }

          # 본 workflow 자체가 안전 flag 를 활성화하지 않는지 regex self-check.
          # 패턴 안에 리터럴 banned 문자열이 *등장하지 않도록* `\s*=\s*` 사용.
          $workflow = Get-Content .github/workflows/desktop-release.yml -Raw
          $bad_patterns = @(
            'ENABLE_LIVE_TRADING\s*[:=]\s*[''"]?true[''"]?',
            'ENABLE_AI_EXECUTION\s*[:=]\s*[''"]?true[''"]?',
            'ENABLE_FUTURES_LIVE_TRADING\s*[:=]\s*[''"]?true[''"]?',
            'KIS_IS_PAPER\s*[:=]\s*[''"]?false[''"]?'
          )
          foreach ($pat in $bad_patterns) {
            if ($workflow -match $pat) {
              Write-Error "Workflow self-violation: regex /$pat/ matched"
              exit 1
            }
          }
          Write-Host "[OK] env.example default + workflow self-check passed"

      # ----- 4. Repository hygiene + security scan (빌드 전 차단) -----
      - name: Install backend deps (test 만 — broker / AI 호출 없음)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run repository hygiene tests
        working-directory: backend
        run: python -m pytest tests/test_repository_hygiene.py -q --no-header

      - name: Run security scan
        run: python scripts/security_scan.py
        # exit code 0 = clean, 1 = HIGH/MEDIUM finding → 빌드 차단

      # ----- 5. Frontend build -----
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Frontend tests + build
        working-directory: frontend
        # lint 단계는 본 PR 시점에 제거 — 베타테스터 빌드 흐름에 필수가 아님.
        # 본 workflow 는 *빌드만* 수행하며 lint regression 은 backend-ci /
        # frontend-ci workflow 에서 검증.
        run: |
          npm test -- --run
          npm run build

      # ----- 6. Backend sidecar (PyInstaller) -----
      # scripts/build_backend_sidecar.ps1 를 그대로 호출 — 본 머신에서 동작하는
      # 빌드 흐름 = CI 빌드 흐름. drift 0건.
      - name: Build backend sidecar
        shell: pwsh
        run: |
          .\scripts\build_backend_sidecar.ps1 -Clean

      - name: Verify sidecar artifact exists
        shell: pwsh
        run: |
          $sidecar = "src-tauri/binaries/autotrade-backend-x86_64-pc-windows-msvc.exe"
          if (-not (Test-Path $sidecar)) {
            Write-Error "backend sidecar missing: $sidecar"
            exit 1
          }
          $size = (Get-Item $sidecar).Length
          $sha = (Get-FileHash -Algorithm SHA256 $sidecar).Hash
          Write-Host "[OK] sidecar: $sidecar ($size bytes, sha256=$sha)"

      # ----- 7. Tauri build (MSI + NSIS) -----
      # cargo tauri build 는 WiX 3.x / NSIS 를 *자동 다운로드* 한다 (Tauri v2
      # 의 동작). 별도 WiX 설치 step 불필요.
      - name: Tauri build
        env:
          # 본 PR 시점에는 updater 비활성 (`plugins.updater.active=false`).
          # 후속 PR 에서 signing 활성화 시 아래 secret 주입:
          # TAURI_PRIVATE_KEY:    ${{ secrets.TAURI_PRIVATE_KEY }}
          # TAURI_KEY_PASSWORD:   ${{ secrets.TAURI_KEY_PASSWORD }}
          NODE_ENV: production
        working-directory: src-tauri
        run: cargo tauri build

      # ----- 8. Safety guard (빌드 후) -----
      # 산출 디렉터리에 .env / secret 패턴이 *없는지* 명시 검증.
      - name: Safety guard — 산출물에 .env / secret 패턴 없음 확인
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/release/bundle"
          if (-not (Test-Path $bundle)) {
            Write-Error "bundle dir missing: $bundle"
            exit 1
          }
          # .env 파일이 bundle 에 포함됐는지 검사.
          $envFiles = Get-ChildItem -Recurse -Path $bundle -ErrorAction SilentlyContinue |
                      Where-Object { $_.Name -match '^\.env$' -or $_.Name -match '\.env\.local$' }
          if ($envFiles.Count -gt 0) {
            Write-Error "FATAL: .env file detected in bundle artifact:"
            $envFiles | ForEach-Object { Write-Error "  - $($_.FullName)" }
            exit 1
          }
          # 인증서 / 키 파일이 bundle 에 포함됐는지 검사.
          $secretExts = Get-ChildItem -Recurse -Path $bundle -ErrorAction SilentlyContinue |
                        Where-Object {
                          $_.Extension -in '.pem','.key','.p12','.pfx','.crt','.cer','.keystore','.jks'
                        }
          if ($secretExts.Count -gt 0) {
            Write-Error "FATAL: certificate/key file detected in bundle:"
            $secretExts | ForEach-Object { Write-Error "  - $($_.FullName)" }
            exit 1
          }
          Write-Host "[OK] bundle safety verified: no .env / no certificate / no keystore"

      - name: Summarize installer artifacts
        shell: pwsh
        run: |
          # NSIS setup.exe 가 *필수 산출물*. MSI 는 일시 보류 (WiX 503) — 디렉터리가
          # 존재하지 않아도 본 step 은 실패하지 않는다 (-ErrorAction SilentlyContinue).
          $exes = Get-ChildItem -Recurse -Path src-tauri/target/release/bundle/nsis -Filter "*-setup.exe" -ErrorAction SilentlyContinue
          $msis = Get-ChildItem -Recurse -Path src-tauri/target/release/bundle/msi -Filter "*.msi" -ErrorAction SilentlyContinue
          Write-Host "=== NSIS setup.exe (required) ==="
          if ($exes.Count -eq 0) {
            Write-Error "FATAL: NSIS setup.exe 가 생성되지 않음"
            exit 1
          }
          foreach ($f in $exes) {
            $sha = (Get-FileHash -Algorithm SHA256 $f.FullName).Hash
            Write-Host "  $($f.FullName) ($($f.Length) bytes, sha256=$sha)"
          }
          Write-Host ""
          Write-Host "=== MSI installers (optional — WiX 503 안정화 후 재활성화) ==="
          if ($msis.Count -eq 0) {
            Write-Host "  (none — MSI target is disabled in tauri.conf.json)"
          } else {
            foreach ($f in $msis) {
              $sha = (Get-FileHash -Algorithm SHA256 $f.FullName).Hash
              Write-Host "  $($f.FullName) ($($f.Length) bytes, sha256=$sha)"
            }
          }

      # ----- 9. Upload workflow artifact -----
      # 항상 업로드 — 운영자가 Release 안 만들고 artifact 만 다운로드 가능.
      # NSIS setup.exe 만 필수 — MSI 는 일시 보류 (tauri.conf.json targets=["nsis"]).
      #
      # fix/step5-github-release-artifact-link (#5-05):
      #   path 패턴은 *오직* setup.exe 만 허용. 인증서 / 키 / .env / latest.json
      #   같은 어떤 secret 또는 config artifact 도 포함하지 않는다. 금지 확장자
      #   목록은 docs/auto_update_policy.md §9-1 참고.
      #   tests/test_repository_hygiene.py 의 desktop_release 가드가 이 경로
      #   패턴을 정적 grep 으로 lock.
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-trader-windows-installer-${{ inputs.release_tag }}
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
          retention-days: 30

      # ----- 10. GitHub Release draft (옵션) -----
      - name: Create GitHub Release (draft)
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: "Agent Trader v1 — ${{ inputs.release_tag }}"
          draft: ${{ inputs.draft }}
          generate_release_notes: true
          body: |
            ## ⚠️ 베타테스터 안내

            본 릴리스는 **한투 모의투자 전용** 입니다. 실제 돈이 나가지 않습니다.

            - `KIS_IS_PAPER=true` 강제
            - `ENABLE_LIVE_TRADING=false`
            - `ENABLE_AI_EXECUTION=false`
            - `ENABLE_FUTURES_LIVE_TRADING=false`

            secret / API key 는 본 installer 에 *포함되지 않습니다*. 운영자가
            `%APPDATA%\Autotrade\.env` 에 한투 *모의투자* 키를 직접 입력해야
            합니다. 자세한 절차는 `docs/exe_oneclick_installation.md` 참조.

            설치 후 SmartScreen 경고가 뜨면 "추가 정보 → 실행" 을 클릭하세요.
            본 릴리스는 코드 서명 인증서가 아직 없을 수 있습니다.
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ----- (후속 PR) auto-updater latest.json 생성 / 업로드 자리 -----
  # 본 PR 시점에는 updater 가 비활성 (pubkey 빈 값). 후속 PR 에서:
  #   - tauri-action 또는 별도 script 가 latest.json (각 platform 의 url +
  #     서명 + version) 을 생성
  #   - 같은 release 에 첨부
