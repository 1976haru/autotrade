name: Backend CI

on:
  push:
    branches: [main, develop, 'feature/**']
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

# 157: 일반 CI는 fast unit + lint만. stress / volume / timing-sensitive
# 테스트는 backend-ci-nightly.yml에서 별도 실행.
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: |
          cd backend
          ruff check app tests
      - name: Test (fast)
        # pyproject.toml의 addopts = "-m 'not slow'"로 stress 자동 제외.
        # `--tb=short -rN` surfaces FAILED test names + short traceback to the
        # step log so failures are visible even without GitHub auth.
        # GITHUB_STEP_SUMMARY mirrors the FAILED summary into the run page UI.
        run: |
          cd backend
          set -o pipefail
          pytest --tb=short -rN -q 2>&1 | tee /tmp/pytest-out.log
          rc=${PIPESTATUS[0]}
          if [ "$rc" -ne 0 ]; then
            echo "## Backend pytest failed" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E "^(FAILED|ERROR|=+ FAILURES =+)" /tmp/pytest-out.log \
              | head -50 >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$rc"
