name: Backend CI

on:
  push:
    branches: [main, develop, 'feature/**']
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

# 157: 일반 CI는 fast unit + lint만. stress / volume / timing-sensitive
# 테스트는 backend-ci-nightly.yml에서 별도 실행.
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: |
          cd backend
          ruff check app tests
      - name: Test (fast)
        id: pytest
        # pyproject.toml의 addopts = "-m 'not slow'"로 stress 자동 제외.
        # On failure: surface every FAILED line as a `::error::` workflow
        # annotation. Annotations appear at the top of the run summary page
        # and are visible to unauthenticated viewers — unlike the step log
        # itself which requires GitHub auth.
        run: |
          cd backend
          set -o pipefail
          pytest --tb=long -rfE 2>&1 | tee pytest-out.log
          rc=${PIPESTATUS[0]}
          if [ "$rc" -ne 0 ]; then
            # Emit annotation per FAILED/ERROR line. Cap at 20 to stay under
            # GitHub's annotation budget (~50 max per check).
            grep -E "^(FAILED|ERROR) " pytest-out.log | head -20 \
              | while IFS= read -r line; do
                  msg=$(echo "$line" | tr -d '\r' | head -c 500)
                  echo "::error::pytest: ${msg}"
                done
            # Also dump the failure section to step summary for reference.
            echo "## Backend pytest failed" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E "^(FAILED|ERROR|=+ FAILURES =+)" pytest-out.log \
              | head -50 >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$rc"
      - name: Upload pytest log on failure
        if: failure() && steps.pytest.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: backend/pytest-out.log
          retention-days: 7
