[tool.ruff]
line-length = 120
target-version = "py312"

# fix/global-ci-stabilization-before-next-step:
# 구조적으로 *의도된* 위반 패턴을 per-file-ignore — 후속 리팩터 PR 에서 코드
# 스타일 정리 시 다시 enable 가능. 본 PR 의 목적은 CI baseline 안정화이며,
# 운영 로직 / broker / OrderExecutor / route_order 변경 0건.
#
# - tests/* 의 E402 : sys.path 또는 fixture import 의 의도된 위치 (운영 코드
#   import *이전* 으로 옮기는 패턴은 점진적 PR 로 진행 중 — #49, #58 참고).
# - tests/* 의 F841 / F541 : test scaffolding 변수 / 사람이 읽는 다층 문자열.
# - app/api/routes_*.py 의 E402 : feature flag / 조건부 import 패턴 — runtime
#   분기에 의존, 단순 상단 이동 시 import 시점 부작용 가능.
[tool.ruff.lint.per-file-ignores]
"tests/*"             = ["E402", "F841", "F541"]
"app/api/routes_*.py" = ["E402"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
# 157: stress / nightly 마커. 일반 CI는 "not slow"로 fast unit 테스트만 실행해
# wall time과 timing-sensitive 실패를 줄인다. nightly workflow는 -m slow로 따로.
markers = [
    "slow: stress / volume / timing-sensitive 테스트. nightly CI / manual 전용.",
]
addopts = "-m 'not slow'"
